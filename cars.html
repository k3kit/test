<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="./src/style.css" rel="stylesheet">
    <title>Каталог автомобилей - AutoDrive</title>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="./index.html">
                <i class="bi bi-speedometer2 me-2"></i>AutoDrive
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html">Главная</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="./cars.html">Автомобили</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html#services">Услуги</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./index.html#contact">Контакты</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h1 class="text-center mb-5 fw-bold">Наш автопарк</h1>

        <div class="row mb-4">
            <div class="col-md-4 mx-auto">
                <select class="form-select" id="carFilter">
                    <option value="all">Все автомобили</option>
                    <option value="sport">Спорткары</option>
                    <option value="luxury">Люкс</option>
                    <option value="electric">Электромобили</option>
                </select>
            </div>
        </div>

        <div class="row g-4" id="carsContainer">
        </div>
    </div>

    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container">
            <div class="text-center">
                <p class="mb-0">&copy; 2026 AutoDrive. Все права защищены.</p>
            </div>
        </div>
    </footer>

    <div class="modal fade" id="carModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Детали автомобиля</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/cars.js"></script>
</body>

</html>
